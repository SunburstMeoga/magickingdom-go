version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: magickingdom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: magickingdom
      MYSQL_USER: magickingdom
      MYSQL_PASSWORD: magickingdom123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - magickingdom-network

  # Go 应用（可选，用于生产环境）
  # app:
  #   build: .
  #   container_name: magickingdom-app
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     CONFIG_PATH: /root/configs/config.yaml
  #   depends_on:
  #     - mysql
  #   networks:
  #     - magickingdom-network

volumes:
  mysql_data:

networks:
  magickingdom-network:
    driver: bridge

